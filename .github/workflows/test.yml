name: Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install core dependencies (no torch for CI speed)
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio httpx loguru numpy networkx scipy \
                    scikit-learn pandas plotly fastapi pydantic uvicorn \
                    dowhy loguru rich reportlab

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short -x \
          --ignore=tests/test_imaging.py \
          --ignore=tests/test_gnn.py

    - name: Run causal demo (smoke test)
      run: |
        python scripts/run_pipeline.py --causal-only --tumor-size 0.4 --n-simulations 50

    - name: Generate synthetic data (smoke test)
      run: |
        python scripts/train_gnn.py generate --n-patients 5 --output-dir /tmp/test_graphs
